name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**/*.md'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Rust-related changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rust:
              - 'fav/**'
              - 'crates/**'
              - '.github/workflows/ci.yml'

  rust:
    name: Rust — build & test
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    env:
      # fav/.cargo/config.toml sets CXXFLAGS for Windows MSVC; clear it on Linux
      CXXFLAGS: ""
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fav/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('fav/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        working-directory: fav
        run: cargo build --locked

      - name: Clippy
        working-directory: fav
        run: cargo clippy --locked -- -D warnings

      - name: Test
        working-directory: fav
        run: cargo test --locked

      - name: Self-check (fav check)
        working-directory: fav
        run: |
          # compiler.fav uses collect/yield (coroutine syntax) which ast_lower_checker does not
          # yet lower to checker.fav IR — use --legacy (Rust checker) as a workaround.
          # See versions/v10.0.0/known-limitations.md
          ./target/debug/fav check --legacy-check self/compiler.fav
          ./target/debug/fav check self/checker.fav
          ./target/debug/fav check self/cli.fav

      - name: Self-lint (fav lint)
        working-directory: fav
        run: |
          ./target/debug/fav lint --deny-warnings --allow W017 --allow W018 --allow W019 self/compiler.fav
          ./target/debug/fav lint --deny-warnings --allow W012 --allow W017 --allow W018 --allow W019 self/checker.fav

      - name: Self-fmt (fav fmt --check)
        working-directory: fav
        run: |
          ./target/debug/fav fmt --check self/compiler.fav
          ./target/debug/fav fmt --check self/checker.fav

      - name: Self-test (fav test)
        working-directory: fav
        run: |
          ./target/debug/fav test self/checker.fav
          ./target/debug/fav test self/compiler.fav
          ./target/debug/fav test self/codegen.fav
          ./target/debug/fav test self/lexer.fav
          ./target/debug/fav test self/parser.fav

  integration:
    name: Integration — Postgres
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    env:
      CXXFLAGS: ""
      DATABASE_URL: "host=localhost user=postgres password=test dbname=postgres sslmode=disable"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fav/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('fav/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        working-directory: fav
        run: cargo build --locked

      - name: Integration tests
        working-directory: fav
        run: cargo test --locked integration -- --test-threads=1

  site:
    name: Site — build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build
        working-directory: site
        run: npm run build
