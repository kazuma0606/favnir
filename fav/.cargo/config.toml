# Limit CPU usage during `cargo build` / `cargo test`.
# Default is num_cpus which saturates the system on a 12C/24T machine.
# Raise if you want faster builds and don't mind the load.
[build]
jobs = 8

[env]
# 日本語 Windows（MSVC + CP932 ロケール）で DuckDB の C++ ソースが文字化けするのを防ぐフラグ。
# force = false のため、シェル側で CXXFLAGS が設定済みの場合はそちらを優先する。
# Linux / WSL ユーザーは ~/.bashrc に `export CXXFLAGS=` を追加することでこの設定を無効化できる。
CXXFLAGS = { value = "/EHsc /utf-8", force = false }
# Parallel test execution threads. Default: num_cpus.
# Set force = false so RUST_TEST_THREADS in shell still overrides this.
RUST_TEST_THREADS = { value = "8", force = false }
# Minimum thread stack size (bytes). Superinstructions (v20.2.0) increase
# compiler.fav's Rust recursion depth slightly; 8 MB prevents overflow in
# tests that run the self-hosted compiler path on complex inputs.
RUST_MIN_STACK = { value = "8388608", force = false }
