name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust — build & test
    runs-on: ubuntu-latest
    env:
      # fav/.cargo/config.toml sets CXXFLAGS for Windows MSVC; clear it on Linux
      CXXFLAGS: ""
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fav/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('fav/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        working-directory: fav
        run: cargo build --locked

      - name: Clippy
        working-directory: fav
        run: cargo clippy --locked -- -D warnings

      - name: Test
        working-directory: fav
        run: cargo test --locked

      - name: Self-check (fav check)
        working-directory: fav
        run: |
          ./target/debug/fav check self/compiler.fav
          ./target/debug/fav check self/checker.fav
          ./target/debug/fav check self/cli.fav

      - name: Self-lint (fav lint)
        working-directory: fav
        run: |
          ./target/debug/fav lint self/compiler.fav
          ./target/debug/fav lint self/checker.fav

      - name: Self-fmt (fav fmt --check)
        working-directory: fav
        run: |
          ./target/debug/fav fmt --check self/compiler.fav
          ./target/debug/fav fmt --check self/checker.fav

  site:
    name: Site — build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build
        working-directory: site
        run: npm run build
